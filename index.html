<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>旅行手帖 Travel Planner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Serif+TC:wght@300;400;700&family=Noto+Sans+TC:wght@300;400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap"
    rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
</head>

<body>

  <!-- ══════════════════════════════════════
     AUTH BAR（頂部固定）
══════════════════════════════════════ -->
  <div id="auth-bar" style="
  position:fixed;top:0;left:0;right:0;z-index:200;
  background:rgba(255,255,255,0.97);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);
  padding:0.6rem 1.5rem;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 1px 8px rgba(0,0,0,0.06);
  transition:all 0.3s;
">
    <div style="display:flex;align-items:center;gap:0.6rem;">
      <div
        style="width:1.8rem;height:1.8rem;border-radius:8px;background:var(--d1);display:flex;align-items:center;justify-content:center;color:white;font-size:0.85rem;">
        <i class="fas fa-route"></i>
      </div>
      <span style="font-size:0.88rem;font-weight:900;color:var(--ink);">旅行手帖</span>
      <span id="sync-badge"
        style="display:none;font-size:0.62rem;font-weight:700;padding:0.15rem 0.5rem;border-radius:999px;background:var(--ok-bg);color:var(--ok);border:1px solid var(--ok-br);">
        <i class="fas fa-cloud"></i> 雲端同步
      </span>
    </div>
    <div id="auth-area" style="display:flex;align-items:center;gap:0.6rem;">
      <button id="login-btn" onclick="signInWithGoogle()" style="
      display:flex;align-items:center;gap:0.4rem;
      padding:0.4rem 1rem;border-radius:8px;
      background:var(--d1);color:white;border:none;
      font-family:inherit;font-size:0.75rem;font-weight:700;
      cursor:pointer;transition:opacity 0.2s;
    "><i class="fab fa-google"></i> Google 登入</button>
      <div id="user-area" style="display:none;align-items:center;gap:0.6rem;">
        <img id="user-avatar" src=""
          style="width:1.8rem;height:1.8rem;border-radius:50%;border:2px solid var(--border);"
          onerror="this.style.display='none'">
        <span id="user-name"
          style="font-size:0.78rem;font-weight:600;color:var(--ink);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></span>
        <button onclick="signOut()" style="
        padding:0.3rem 0.7rem;border-radius:6px;
        background:transparent;color:var(--muted);border:1px solid var(--border);
        font-family:inherit;font-size:0.72rem;font-weight:600;cursor:pointer;
      ">登出</button>
      </div>
    </div>
  </div>

  <!-- 分享連結 Modal -->
  <div id="share-modal" style="
  display:none;position:fixed;inset:0;z-index:300;
  background:rgba(0,0,0,0.5);backdrop-filter:blur(6px);
  align-items:center;justify-content:center;padding:1rem;
">
    <div style="
    background:white;border-radius:16px;border:1px solid var(--border);
    padding:2rem;max-width:500px;width:100%;
    box-shadow:0 20px 60px rgba(0,0,0,0.15);
  ">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem;">
        <div style="font-size:1rem;font-weight:800;color:var(--ink);">🔗 分享行程</div>
        <button onclick="closeShareModal()"
          style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:1.1rem;"><i
            class="fas fa-times"></i></button>
      </div>

      <div style="margin-bottom:1rem;">
        <div
          style="font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:0.5rem;">
          權限設定</div>
        <div style="display:flex;gap:0.5rem;">
          <label style="flex:1;cursor:pointer;">
            <input type="radio" name="share-perm" value="view" checked style="display:none;">
            <div class="share-perm-btn" data-val="view" style="
            padding:0.6rem 1rem;border-radius:8px;border:1.5px solid var(--d1);
            background:var(--d1);color:white;text-align:center;
            font-size:0.78rem;font-weight:700;transition:all 0.15s;
          ">👁 唯讀</div>
          </label>
          <label style="flex:1;cursor:pointer;">
            <input type="radio" name="share-perm" value="edit" style="display:none;">
            <div class="share-perm-btn" data-val="edit" style="
            padding:0.6rem 1rem;border-radius:8px;border:1.5px solid var(--border);
            background:white;color:var(--muted);text-align:center;
            font-size:0.78rem;font-weight:700;transition:all 0.15s;
          ">✏️ 可編輯</div>
          </label>
        </div>
      </div>

      <button onclick="generateShareLink()" style="
      width:100%;padding:0.7rem;border-radius:8px;
      background:var(--d1);color:white;border:none;
      font-family:inherit;font-size:0.82rem;font-weight:700;cursor:pointer;
      margin-bottom:0.8rem;transition:opacity 0.2s;
    " id="gen-share-btn"><i class="fas fa-link"></i> 產生分享連結</button>

      <div id="share-link-box" style="display:none;">
        <div style="
        display:flex;gap:0.4rem;align-items:center;
        background:var(--bg);border:1.5px solid var(--border);
        border-radius:8px;padding:0.5rem 0.7rem;
      ">
          <input id="share-link-input" type="text" readonly style="
          flex:1;border:none;background:transparent;
          font-size:0.78rem;color:var(--ink);outline:none;
          font-family:monospace;
        ">
          <button onclick="copyShareLink()" style="
          padding:0.3rem 0.7rem;border-radius:6px;
          background:var(--d2);color:white;border:none;
          font-size:0.72rem;font-weight:700;cursor:pointer;
          flex-shrink:0;white-space:nowrap;
        "><i class="fas fa-copy"></i> 複製</button>
        </div>
        <div style="font-size:0.72rem;color:var(--muted);margin-top:0.5rem;">
          <i class="fas fa-info-circle"></i> 任何有此連結的人均可存取，請妥善保管。
        </div>
      </div>

      <div style="border-top:1px solid var(--border);margin-top:1.2rem;padding-top:1.2rem;">
        <div
          style="font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:0.6rem;">
          邀請協作者（輸入 Email）</div>
        <div style="display:flex;gap:0.4rem;">
          <input id="collab-email" type="email" placeholder="friend@gmail.com" style="
          flex:1;padding:0.55rem 0.8rem;border-radius:8px;
          border:1.5px solid var(--border);background:var(--bg);
          font-family:inherit;font-size:0.8rem;color:var(--ink);outline:none;
        ">
          <button onclick="inviteCollaborator()" style="
          padding:0.55rem 1rem;border-radius:8px;
          background:var(--d4);color:white;border:none;
          font-family:inherit;font-size:0.78rem;font-weight:700;cursor:pointer;
          flex-shrink:0;
        ">邀請</button>
        </div>
        <div id="collab-status" style="font-size:0.72rem;margin-top:0.4rem;min-height:1.2rem;"></div>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════
     HOME: Trip Selector
══════════════════════════════════════ -->
  <div id="trip-selector">
    <div class="home-title">Travel Planner</div>
    <div class="home-subtitle">旅行手帖 · Journey Archive · 行程管理工具</div>
    <div class="divider-ornament">Journeys</div>

    <div class="trip-cards-grid" id="trip-cards-container">
      <!-- Rendered by JS -->
    </div>
  </div>

  <!-- ══════════════════════════════════════
     DETAIL: Trip View
══════════════════════════════════════ -->
  <div id="trip-detail">
    <div class="detail-header">
      <div class="detail-nav">
        <button class="back-btn" onclick="showHome()">
          <i class="fas fa-arrow-left"></i> 返回列表
        </button>
        <div class="detail-title serif" id="detail-title-text"></div>
        <button class="btn-ghost" style="font-size:0.75rem;padding:0.4rem 0.8rem;" onclick="openEditor()">
          <i class="fas fa-edit mr-1"></i>編輯
        </button>
      </div>
      <div class="day-nav-scroll" id="day-nav-pills"></div>
    </div>
    <div class="trip-main" id="trip-main-content"></div>
  </div>

  <!-- ══════════════════════════════════════
     Form Editor Modal
══════════════════════════════════════ -->
  <div id="editor-modal">
    <div class="editor-box form-editor">
      <div class="editor-tabs">
        <button class="ed-tab active" data-tab="basic">ℹ️ 基礎資訊</button>
        <button class="ed-tab" data-tab="flights">✈️ 航班</button>
        <button class="ed-tab" data-tab="tickets">🎫 票券</button>
        <button class="ed-tab" data-tab="days">📅 每日行程</button>
      </div>

      <div class="editor-scroll-area">
        <!-- 基礎資訊 -->
        <div id="tab-basic" class="ed-pane active">
          <div class="form-grid">
            <div class="form-group col-span-2">
              <label>行程標題</label>
              <input type="text" id="fm-title" placeholder="例如：昇龍道至東京">
            </div>
            <div class="form-group col-span-2">
              <label>副標題</label>
              <input type="text" id="fm-subtitle" placeholder="例如：8 日全景旅行">
            </div>
            <div class="form-group">
              <label>國家</label>
              <input type="text" id="fm-country" placeholder="例如：日本">
            </div>
            <div class="form-group">
              <label>年份</label>
              <input type="text" id="fm-year" placeholder="例如：2026">
            </div>
            <div class="form-group">
              <label>日期範圍</label>
              <input type="text" id="fm-dates" placeholder="例如：4/1 – 4/8">
            </div>
            <div class="form-group">
              <label>封面 Emoji</label>
              <input type="text" id="fm-emoji" placeholder="例如：🌸">
            </div>
          </div>
        </div>

        <!-- 航班 -->
        <div id="tab-flights" class="ed-pane">
          <h4 class="pane-title">去程航班 (Outbound)</h4>
          <div class="form-grid mb-4">
            <div class="form-group"><label>標籤</label><input type="text" id="fm-out-label"
                placeholder="例如：去程航班 (4/1 樂桃 MM 722)"></div>
            <div class="form-group"><label>航班代碼</label><input type="text" id="fm-out-iata" placeholder="例如：MM722"></div>
            <div class="form-group"><label>起降時間</label><input type="text" id="fm-out-time" placeholder="例如：02:10"></div>
            <div class="form-group"><label>航線</label><input type="text" id="fm-out-route"
                placeholder="例如：TPE 02:10 → NGO 06:00"></div>
            <div class="form-group col-span-2"><label>航廈詳細</label><input type="text" id="fm-out-detail"
                placeholder="例如：第一航廈 出發 / 第一航廈 抵達"></div>
          </div>
          <h4 class="pane-title">回程航班 (Inbound)</h4>
          <div class="form-grid">
            <div class="form-group"><label>標籤</label><input type="text" id="fm-in-label"
                placeholder="例如：回程航班 (4/8 酷航 TR 867)"></div>
            <div class="form-group"><label>航班代碼</label><input type="text" id="fm-in-iata" placeholder="例如：TR867"></div>
            <div class="form-group"><label>起降時間</label><input type="text" id="fm-in-time" placeholder="例如：12:30"></div>
            <div class="form-group"><label>航線</label><input type="text" id="fm-in-route"
                placeholder="例如：NRT 12:30 → TPE 15:10"></div>
            <div class="form-group col-span-2"><label>航廈詳細</label><input type="text" id="fm-in-detail"
                placeholder="例如：第一航廈 出發 / 第一航廈 抵達"></div>
          </div>
        </div>

        <!-- 票券 -->
        <div id="tab-tickets" class="ed-pane">
          <div id="fm-tickets-list"></div>
          <button class="btn-ghost mt-2" onclick="addTicketUI()" style="width:100%"><i class="fas fa-plus"></i>
            新增票券</button>
        </div>

        <!-- 每日行程 -->
        <div id="tab-days" class="ed-pane" style="display:flex;gap:1rem;padding:0;">
          <div class="days-sidebar" id="fm-days-sidebar">
            <button class="day-add-btn" onclick="addDayUI()"><i class="fas fa-plus"></i> 新增一天</button>
          </div>
          <div class="day-editor-area" id="fm-day-editor-area" style="flex:1;padding:1.5rem;">
            <div class="text-center text-muted" style="margin-top:2rem;">請在左側選擇或新增一天來編輯</div>
          </div>
        </div>
      </div>

      <div class="editor-footer flex gap-2 justify-end">
        <div id="editor-error" class="text-sm" style="color:#e88;display:none;margin-right:auto;align-self:center;">
        </div>
        <button class="btn-ghost" onclick="closeEditor()">取消</button>
        <button class="btn-primary" onclick="saveFormEditor()">儲存行程</button>
      </div>
    </div>
  </div>
  </div>

  <div id="toast-container" style="
    position: fixed; bottom: 1.5rem; right: 1.5rem;
    z-index: 9999; display: flex; flex-direction: column; gap: 0.5rem;
    pointer-events: none;
  "></div>

  <!-- ══════════════════════════════════════
     SUPABASE SDK
══════════════════════════════════════ -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- ══════════════════════════════════════
     DATA & LOGIC
══════════════════════════════════════ -->
  <!-- ══════════════════════════════════════
     GEOCODE MODAL (Google Maps & Plus Code)
══════════════════════════════════════ -->
  <div id="geocode-modal" class="modal">
    <div class="modal-overlay" onclick="closeGeocodeModal()"></div>
    <div class="modal-content" style="max-width:400px; padding: 2rem;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
        <h2 class="pane-title" style="margin:0; border:none;">📍 搜尋精確座標</h2>
        <button class="btn-ghost" onclick="closeGeocodeModal()" style="font-size:1.2rem;"><i class="fas fa-times"></i></button>
      </div>
      
      <!-- 第一步：輸入框 -->
      <div id="gc-step-1">
        <label style="font-size:0.85rem; color:var(--muted); margin-bottom:0.4rem; display:block;">請輸入或修改要搜尋的地點 / Plus Code：</label>
        <div class="form-group" style="display:flex; gap:0.5rem; align-items:center;">
          <input type="text" id="gc-query-input" placeholder="例如：淺草寺 雷門" style="flex:1;">
          <button id="gc-search-btn" style="background:var(--d1); color:white; border:none; border-radius:8px; padding:0.6rem 1rem; font-weight:600; cursor:pointer;" onclick="executeGeocodeSearch()">搜尋</button>
        </div>
        <div id="gc-error" style="color:var(--danger); font-size:0.8rem; margin-top:0.5rem; display:none;"></div>
      </div>

      <!-- 第二步：確認結果 -->
      <div id="gc-step-2" style="display:none; background:#f6fbf8; border:1px solid var(--ok); border-radius:8px; padding:1.2rem; margin-top:1rem;">
        <div style="color:var(--ok); font-weight:700; margin-bottom:0.5rem;"><i class="fas fa-check-circle"></i> 找到地點！</div>
        <div id="gc-result-address" style="font-size:0.9rem; line-height:1.4; color:#333; margin-bottom:1rem;"></div>
        <input type="hidden" id="gc-result-lat">
        <input type="hidden" id="gc-result-lon">
        <div style="display:flex; gap:0.5rem; justify-content:flex-end;">
          <button class="btn-ghost" onclick="resetGeocodeModal()" style="color:var(--muted); padding:0.5rem 1rem;">重新搜尋</button>
          <button style="background:var(--ok); color:white; border:none; border-radius:8px; padding:0.5rem 1.2rem; font-weight:600; cursor:pointer;" onclick="confirmGeocodeBind()">確定綁定</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/weather.js"></script>
  <script src="js/rendering.js"></script>
  <script src="js/editor.js"></script>
  <script src="js/auth.js"></script>
</body>

</html>
